<html>
{% load static %}
<head>
  <meta charset="UTF-8">
  <title>avalonJSP</title>
    <script src="/static/SpryAssets/SpryMenuBar.js" type="text/javascript"></script>
	<script src="/static/SpryAssets/SpryValidationTextField.js" type="text/javascript"></script>
	<link href="/static/SpryAssets/SpryMenuBarHorizontal.css" rel="stylesheet" type="text/css" />
	<link href="/static/SpryAssets/SpryValidationTextField.css" rel="stylesheet" type="text/css" />
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="icon" type="image/x-icon" href="{% static 'images/038072.png' %}">
</head>
<style>
  body{
      display:flex;
      flex-direction:column;
      width:100%;
      height:100%;
      margin:0px;
  }
  #div_banner {
    width: 100%;
    height: 80px;
    background-image: url("{% static 'images/banner.png' %}");
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    justify-content: center;
    align-items: center;
  }

  #div_menu{
      background-color:#0077ff;
      height:37px;
  }
  #div_content{
      //background-color:#c0c0ff;
      flex-grow:1;
      display:flex;
      flex-direction:column;
      width:100%;
      height:100%;
      align-items:center;
  }
  #div_copyright{
      background-color:#00aaff;
      height:25px;
      text-align:right;

  }
  #logout{
        display:none;
  }




  ul.MenuBarHorizontal a {
		color: #000;
		background-color: transparent;
   }
   ul.MenuBarHorizontal a:hover{
       background-color: #005555;
   }
   ul.MenuBarHorizontal ul a {
        background-color: #dddddd;
   }
   ul.MenuBarHorizontal li.MenuBarItemIE {
       background: transparent;
   }
   .sign_container {
       position: absolute;
       right: 0px;
       z-index: 2;
   }
   .sign_logo {
       position: relative;
       margin-right: 12px;
       margin-top: 6px;
       width: 25px;
       height: 25px;
   }

</style>
<body>
    <a href="/">
        <div id="div_banner">
        </div>
    </a>

    <div id="div_menu">
        <ul id="MenuBar1" class="MenuBarHorizontal">
            <li>
                <a href="/travel/">旅遊軌跡</a>
            </li>
            <li>
                <a href="/gallery/">相片記錄</a>
            </li>
            <li>
                <a href="/tools/">工具下載</a>
            </li>
            <li>
                <a href="#">財經資訊</a>
                <ul>
                    <li>
                        <a href="/twstock/">台灣股市</a>
                    </li>
                    <li>
                        <a href="/twgold/">台灣黃金</a>
                    </li>
                </ul>
            </li>
             <li id="logout">
                 <a href="/logout/">登出</a>
             </li>
        </ul>
    </div>
    <div id="div_content">
      {% block content1 %}
      {% endblock %}
    </div>
    <div id="div_copyright">
    Powerby Avalon Lin
    </div>
</body>
<script>
    var MenuBar1 = new Spry.Widget.MenuBar(
        "MenuBar1", {imgDown:"/static/SpryAssets/SpryMenuBarDownHover.gif",
        imgRight:"/static/SpryAssets/SpryMenuBarRightHover.gif"}
    );
</script>
</html>
